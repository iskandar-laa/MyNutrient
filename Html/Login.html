<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Nutrient</title>
    <link rel="stylesheet" href="../Css/Login.css">
</head>
<body>

<div class="container">
    <div class="left">
        <div class="content-box">
            <h1>Welcome Back!</h1>
            <p>We provide smart nutrient recommendations for agriculture using weather and soil data to help farmers manage crops effectively.</p>
            <button id="googleBtn" class="google-btn">Login with Google</button>
            <div class="or">or</div>
            <button id="appleBtn" class="email-btn">Login with Apple</button>
        </div>
        <img src="https://7thandpalm.com/cdn/shop/files/7P_ST0052-Jade-Plant-Sticker.jpg?v=1688078520" class="plant">
    </div>

    <div class="right">
        <div class="login-box">
            <h3>Login Your Farm</h3>
            <input type="email" id="emailInput" placeholder="Enter Your Email">
            <input type="password" id="passwordInput" placeholder="Enter Password">
            <a href="#" class="forgot">Forget Password?</a>
            <button id="loginBtn" class="login-btn">Login</button>
            <p class="register">
                Don't have an account? <a href="/Html/Register.html">Register</a>
            </p>
        </div>
    </div>
</div>

<script type="module" src="../Database/auth.js"></script>

</body>
</html>
